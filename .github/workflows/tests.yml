name: Tests CI
on: [push, workflow_dispatch]
jobs:
  unit-vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # keep in sync with local dev — the lockfile is written by npm 11
          node-version: '24'
      - run: npm install
      - run: npm test
  ui-cypress-percy-chrome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm ci needs npm 11 to read the lockfile (see unit-vitest job)
          node-version: '24'
      # Install NPM dependencies, cache them correctly
      # and run all Cypress tests against the statically generated site
      - name: Cypress Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          record: true
          projectId: ${{ secrets.CY_DASHBOARD_ID }}
          build: npm run generate
          start: npx serve .output/public -l 3000
          wait-on: 'http://localhost:3000'
        env:
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
      - name: Percy Test
        run: npx percy exec -- cypress run --browser chrome --headless --env percy=treu,grep=visual
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
