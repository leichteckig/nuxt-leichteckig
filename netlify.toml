[Settings]
  ID = "realworld-nuxt"

[build]
  # On Netlify, Nitro auto-detects the netlify-static preset and emits
  # to `dist` (locally, `dist` is a symlink to .output/public)
  publish = "dist"
  command = "npm run generate"

[build.environment]
  NODE_VERSION = "24"

# Build assets in /_nuxt are content-hashed, so they can be cached forever
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
